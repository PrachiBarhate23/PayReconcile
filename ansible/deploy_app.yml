---
- name: Deploy PayReconcile Application
  hosts: all
  become: yes
  tasks:
    - name: Ensure backend service is stopped
      systemd:
        name: payreconcile
        state: stopped
      ignore_errors: yes

    - name: Update backend service template with env vars
      template:
        src: templates/payreconcile.service.j2
        dest: /etc/systemd/system/payreconcile.service
      notify: Reload Systemd

    - name: Start backend service
      systemd:
        name: payreconcile
        state: started
        enabled: yes
