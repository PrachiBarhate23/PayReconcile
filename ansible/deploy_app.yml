---
- name: Deploy PayReconcile Application (Docker)
  hosts: all
  become: yes   # All tasks run as root — avoids docker socket permission issues

  tasks:

    # ── Ensure app directory exists ────────────────────────────────────────
    - name: Ensure app directory exists
      file:
        path: /opt/payreconcile
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0750'

    # ── Stop old native Java service ───────────────────────────────────────
    - name: Ensure old native backend service is stopped
      systemd:
        name: payreconcile
        state: stopped
        enabled: no
      ignore_errors: yes

    # ── Kill any Java process holding port 5000 ────────────────────────────
    - name: Kill any Java process (old native backend)
      shell: pkill -f "java" || true
      ignore_errors: yes

    # ── Force-remove the backend container specifically ────────────────────
    - name: Force-remove backend container if it exists
      shell: docker rm -f payreconcile-backend || true
      ignore_errors: yes

    # ── Kill any remaining process on port 5000 ────────────────────────────
    - name: Kill any process still on port 5000
      shell: |
        pid=$(lsof -ti:5000 2>/dev/null); [ -n "$pid" ] && kill -9 $pid || true
      ignore_errors: yes

    # ── ECR Login ─────────────────────────────────────────────────────────
    - name: Login to Amazon ECR
      shell: |
        aws ecr get-login-password --region us-east-1 | \
        docker login --username AWS --password-stdin {{ ecr_registry }}
      environment:
        AWS_ACCESS_KEY_ID: "{{ aws_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ aws_secret_key }}"

    # ── Template the production docker-compose file ────────────────────────
    - name: Write production docker-compose file
      template:
        src: templates/docker-compose.prod.yml.j2
        dest: /opt/payreconcile/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: '0600'

    # ── Pull latest images from ECR ────────────────────────────────────────
    - name: Pull latest Docker images
      shell: docker compose -f /opt/payreconcile/docker-compose.yml pull

    # ── Start containers fresh ─────────────────────────────────────────────
    - name: Start containers with updated images
      shell: docker compose -f /opt/payreconcile/docker-compose.yml up -d

    # ── Clean up dangling images to free disk space ────────────────────────
    - name: Prune unused Docker images
      shell: docker image prune -f

    # ── Wait and fetch logs for debugging ──────────────────────────────────
    - name: Wait 15 seconds for Spring Boot to start
      pause:
        seconds: 15

    - name: Fetch backend logs to ensure it started successfully
      shell: docker logs payreconcile-backend | tail -n 50
      register: backend_logs
      ignore_errors: yes

    - name: Print backend logs for debugging 502 errors
      debug:
        var: backend_logs.stdout_lines
