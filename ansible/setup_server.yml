---
- name: Setup PayReconcile Server
  hosts: servers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Java 17
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Create app directory
      file:
        path: /opt/payreconcile/backend
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Setup Backend Systemd Service
      template:
        src: templates/payreconcile.service.j2
        dest: /etc/systemd/system/payreconcile.service
      notify: Reload Systemd

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: yes
