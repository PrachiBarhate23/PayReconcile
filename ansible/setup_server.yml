---
- name: Setup PayReconcile Server
  hosts: servers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Java 17
      apt:
        name: openjdk-17-jdk
        state: present

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Create app directory
      file:
        path: /opt/payreconcile/backend
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Allow HTTP traffic (Port 80)
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow App traffic (Port 5000)
      ufw:
        rule: allow
        port: '5000'
        proto: tcp

    - name: Configure Nginx as Reverse Proxy
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80;
              location / {
                  proxy_pass http://localhost:5000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
      notify: Restart Nginx

    - name: Setup Backend Systemd Service
      template:
        src: templates/payreconcile.service.j2
        dest: /etc/systemd/system/payreconcile.service
      notify: Reload Systemd

  handlers:
    - name: Reload Systemd
      systemd:
        daemon_reload: yes

    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
