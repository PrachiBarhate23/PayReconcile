name: Read Server Logs

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  read-logs:
    runs-on: ubuntu-latest
    steps:
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/payreconcile-key.pem
        chmod 600 ~/.ssh/payreconcile-key.pem

    - name: Fetch Application Logs & Health Check
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          echo "--- RECENT APPLICATION LOGS (200 Lines) ---"
          sudo tail -n 200 /var/log/payreconcile.log || echo "Log file not found yet"
          echo ""
          echo "--- LOCAL HEALTH CHECK (Checking port 5000) ---"
          curl -I http://localhost:5000 || echo "App is NOT responding on port 5000"
          echo ""
          echo "--- SERVICE STATUS ---"
          sudo systemctl status payreconcile
