name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'ecommerce-backend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Create app parent directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo mkdir -p /opt/payreconcile/backend
          sudo chown -R ubuntu:ubuntu /opt/payreconcile

    - name: Build with Maven
      run: |
        cd ecommerce-backend
        mvn clean package -DskipTests

    - name: Copy JAR and Properties to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "ecommerce-backend/target/app.jar,ecommerce-backend/src/main/resources/application.properties"
        target: "/opt/payreconcile/backend"
        strip_components: 3

    # - name: Restart Backend Service (Legacy)
    #   uses: appleboy/ssh-action@v1.0.3
    #   with:
    #     host: ${{ secrets.EC2_HOST }}
    #     username: ${{ secrets.EC2_USER }}
    #     key: ${{ secrets.EC2_SSH_KEY }}
    #     script: |
    #       sudo systemctl restart payreconcile
    #       sudo systemctl status payreconcile

    - name: Setup SSH Key for Ansible
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/payreconcile-key.pem
        chmod 600 ~/.ssh/payreconcile-key.pem

    - name: Run Ansible Deploy Playbook
      env:
        ANSIBLE_HOST_KEY_CHECKING: 'False'
      run: |
        cd ansible
        ansible-playbook -i hosts.yml deploy_app.yml \
          --extra-vars "ec2_ip=${{ secrets.EC2_HOST }} stripe_secret=${{ secrets.STRIPE_SECRET_KEY }} stripe_publishable=${{ secrets.STRIPE_PUBLISHABLE_KEY }}"
