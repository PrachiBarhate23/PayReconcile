name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'ecommerce-backend/**'
  workflow_dispatch:

env:
  ECR_REPOSITORY: payreconcile-backend
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ── Step 1: Java setup (needed for SonarCloud) ─────────────────────────
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ── Step 2: Maven build (for SonarCloud analysis) ──────────────────────
    - name: Build with Maven
      run: |
        cd ecommerce-backend
        mvn clean package -DskipTests

    # ── Step 3: SonarCloud (unchanged) ─────────────────────────────────────
    - name: SonarCloud Analysis (Backend)
      continue-on-error: true
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        cd ecommerce-backend
        mvn sonar:sonar \
          -Dsonar.projectKey=PayReconcile \
          -Dsonar.organization=prachiBarhate23 \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

    # ── Step 4: Configure AWS credentials ──────────────────────────────────
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # ── Step 5: Login to Amazon ECR ────────────────────────────────────────
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # ── Step 6: Build Docker image & push to ECR ───────────────────────────
    - name: Build, Tag & Push Backend Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
          ./ecommerce-backend
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "BACKEND_IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_ENV

    # ── Step 7: Deploy via Ansible ─────────────────────────────────────────
    - name: Install Ansible
      run: pip install ansible

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/payreconcile-key.pem
        chmod 600 ~/.ssh/payreconcile-key.pem

    - name: Run Ansible Deploy Playbook
      env:
        ANSIBLE_HOST_KEY_CHECKING: 'False'
      run: |
        cd ansible
        ansible-playbook -i hosts.yml setup_server.yml --extra-vars "ec2_ip=${{ secrets.EC2_HOST }}"
        ansible-playbook -i hosts.yml deploy_app.yml \
          --extra-vars "\
            ec2_ip=${{ secrets.EC2_HOST }} \
            ecr_registry=${{ steps.login-ecr.outputs.registry }} \
            backend_image=${{ env.BACKEND_IMAGE }} \
            frontend_image=${{ steps.login-ecr.outputs.registry }}/payreconcile-frontend:latest \
            stripe_secret=${{ secrets.STRIPE_SECRET_KEY }} \
            stripe_publishable=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            stripe_webhook_secret=${{ secrets.STRIPE_WEBHOOK_SECRET }} \
            mongodb_uri=${{ secrets.MONGODB_URI }} \
            mail_username=${{ secrets.MAIL_USERNAME }} \
            mail_password=${{ secrets.MAIL_PASSWORD }} \
            aws_access_key=${{ secrets.AWS_ACCESS_KEY_ID }} \
            aws_secret_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}"
