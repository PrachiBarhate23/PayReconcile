name: Frontend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'ecommerce-frontend/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # SonarCloud needs full git history for blame info

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: ecommerce-frontend/package-lock.json

    - name: Install dependencies and Build
      env:
        STRIPE_PUB_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      run: |
        cd ecommerce-frontend
        echo "VITE_API_BASE_URL=/api" > .env
        echo "VITE_STRIPE_PUBLISHABLE_KEY=$STRIPE_PUB_KEY" >> .env
        npm install
        npm run build

    - name: SonarCloud Analysis (Frontend)
      uses: SonarSource/sonarcloud-github-action@master
      continue-on-error: true
      with:
        projectBaseDir: ecommerce-frontend
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    - name: Deploy to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "ecommerce-frontend/dist/*"
        target: "/var/www/payreconcile/"
        strip_components: 2
